name: C++ CI with Tests and Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: sudo apt-get install -y gcovr
    
    - name: Configure CMake with coverage
      run: cmake -H. -B build -DBUILD_TESTS=ON -DENABLE_COVERAGE=ON
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
    
    - name: Generate coverage report with gcovr
      run: |
        cd build
        gcovr --root .. --xml --output coverage.xml
        gcovr --root .. --txt | tee coverage.txt
    
    - name: Show coverage summary
      run: |
        cd build
        gcovr --root .. --txt --filter '.*/banking/src/.*' --filter '.*/sources/.*'
    
    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.xml
        format: cobertura
